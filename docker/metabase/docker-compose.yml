services:
  metabase:
    image: metabase/metabase:v0.53.4
    container_name: e-insight-metabase
    ports:
      - "3000:3000"
    environment:
      MB_JETTY_HOST: 0.0.0.0
      MB_JETTY_PORT: 3000
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  metabase-data:
