# Render Blueprint — deploy ML forecast service
# Dashboard: New > Blueprint > connect repo infoviral119-hash/DSS
services:
  - type: web
    name: e-insight-ml
    runtime: docker
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ML_SERVICE_PORT
        value: "8000"
