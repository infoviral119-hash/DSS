# Named Cloudflare Tunnel — URL tetap (butuh domain di Cloudflare DNS)
# Setup: .\scripts\setup-named-tunnel.ps1 -Hostname ml.yourdomain.com
#
# Ganti TUNNEL_ID dan credentials path dari output: cloudflared tunnel create e-insight-ml

tunnel: e-insight-ml
credentials-file: C:\Users\USER\.cloudflared\TUNNEL_ID.json

ingress:
  # ML forecast service (ml-service uvicorn port 8000)
  - hostname: ml.yourdomain.com
    service: http://localhost:8000
  # Optional: NestJS backend lokal
  - hostname: api.yourdomain.com
    service: http://localhost:3001
  - service: http_status:404
